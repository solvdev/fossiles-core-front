name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Marcar inicio
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # Importante: pipefail. Sin eso, `cmd | tee` reporta éxito aunque cmd falle
      # (npm build error → Discord "Deploy exitoso" sin subir el build nuevo).
      - name: Instalar dependencias
        id: install
        run: |
          set -euo pipefail
          npm ci 2>&1 | tee -a /tmp/deploy.log

      - name: Build
        id: build
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee -a /tmp/deploy.log
          test -d build
          test -f build/index.html
          echo "Build OK: $(du -sh build | cut -f1)"

      - name: Setup SSH key
        id: ssh_setup
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: Falta el secret SSH_PRIVATE_KEY en GitHub (Settings → Secrets)."
            exit 1
          fi
          if [ -z "${{ secrets.FRONT_HOST }}" ]; then
            echo "ERROR: Falta el secret FRONT_HOST en GitHub."
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "ERROR: Falta el secret SSH_USER en GitHub."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -lf ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "ERROR: SSH_PRIVATE_KEY no parece una clave privada válida (revisa saltos de línea al pegar el secret)."
            exit 1
          fi
          echo "Obteniendo host key de ${{ secrets.FRONT_HOST }} ..."
          SCAN_LOG="$(mktemp)"
          if ! ssh-keyscan -T 20 -H "${{ secrets.FRONT_HOST }}" > "$SCAN_LOG" 2>&1; then
            cat "$SCAN_LOG" | tee -a /tmp/deploy.log
            echo "ERROR: ssh-keyscan no pudo contactar a FRONT_HOST."
            echo "Verifica: host correcto, DNS, firewall (IPs de GitHub Actions) y que el servidor esté encendido."
            exit 1
          fi
          if [ ! -s "$SCAN_LOG" ]; then
            cat "$SCAN_LOG" | tee -a /tmp/deploy.log || true
            echo "ERROR: ssh-keyscan no devolvió ninguna clave de host."
            exit 1
          fi
          cat "$SCAN_LOG" >> ~/.ssh/known_hosts
          rm -f "$SCAN_LOG"
          echo "SSH key lista" | tee -a /tmp/deploy.log

      - name: Sincronizar build al servidor (rsync, solo deltas)
        id: transfer
        run: |
          set -euo pipefail
          test -d build
          test -f build/index.html
          rsync -avz --delete \
            --rsync-path="sudo rsync" \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            build/ \
            ${{ secrets.SSH_USER }}@${{ secrets.FRONT_HOST }}:/var/www/front/build/ \
            2>&1 | tee -a /tmp/deploy.log

      - name: Recargar Nginx
        id: reload
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.FRONT_HOST }} \
            "sudo systemctl reload nginx && systemctl is-active nginx" \
            2>&1 | tee -a /tmp/deploy.log

      - name: Notificar en Discord
        if: always()
        continue-on-error: true
        run: |
          DURATION=$(( $(date +%s) - ${DEPLOY_START:-$(date +%s)} ))
          MIN=$(( DURATION / 60 )); SEC=$(( DURATION % 60 ))

          INSTALL_OUT="${{ steps.install.outcome }}"
          BUILD_OUT="${{ steps.build.outcome }}"
          SSH_OUT="${{ steps.ssh_setup.outcome }}"
          TRANSFER_OUT="${{ steps.transfer.outcome }}"
          RELOAD_OUT="${{ steps.reload.outcome }}"

          DEPLOY_OK=true
          PASO_FALLIDO="-"
          for par in \
            "Instalar dependencias:$INSTALL_OUT" \
            "Build:$BUILD_OUT" \
            "Setup SSH:$SSH_OUT" \
            "Sincronizar build:$TRANSFER_OUT" \
            "Recargar Nginx:$RELOAD_OUT"
          do
            nombre="${par%%:*}"
            estado="${par##*:}"
            if [ "$estado" = "failure" ] || [ "$estado" = "cancelled" ]; then
              DEPLOY_OK=false
              PASO_FALLIDO="$nombre"
            fi
          done
          if [ "${{ job.status }}" != "success" ]; then
            DEPLOY_OK=false
          fi
          if [ "$BUILD_OUT" != "success" ]; then
            DEPLOY_OK=false
            [ "$PASO_FALLIDO" = "-" ] && PASO_FALLIDO="Build"
          fi

          if [ "$DEPLOY_OK" = true ]; then
            EMOJI="✅"; COLOR=3066993; TITULO="Deploy exitoso"
          else
            EMOJI="❌"; COLOR=15158332; TITULO="Deploy fallido"
          fi

          ERR_LOG=$(tail -c 3000 /tmp/deploy.log 2>/dev/null | sed 's/\x1b\[[0-9;]*m//g')
          [ -z "$ERR_LOG" ] && ERR_LOG="(sin logs capturados)"

          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_CORTO="${{ github.sha }}"
          COMMIT_CORTO="${COMMIT_CORTO:0:7}"

          if [ "$DEPLOY_OK" = true ]; then
            PAYLOAD=$(jq -n \
              --arg titulo "$EMOJI $TITULO — ${{ github.repository }}" \
              --arg url "$RUN_URL" \
              --argjson color $COLOR \
              --arg rama "${{ github.ref_name }}" \
              --arg commit "$COMMIT_CORTO" \
              --arg commiturl "$COMMIT_URL" \
              --arg autor "${{ github.actor }}" \
              --arg duracion "${MIN}m ${SEC}s" \
              --arg sitio "http://${{ secrets.FRONT_HOST }}" \
              '{embeds: [{
                title: $titulo, url: $url, color: $color,
                fields: [
                  {name: "Rama", value: $rama, inline: true},
                  {name: "Duración", value: $duracion, inline: true},
                  {name: "Sitio", value: $sitio, inline: true},
                  {name: "Autor", value: $autor, inline: true},
                  {name: "Commit", value: ("[`" + $commit + "`](" + $commiturl + ")"), inline: true}
                ],
                timestamp: (now | todate)
              }]}')
          else
            PAYLOAD=$(jq -n \
              --arg titulo "$EMOJI $TITULO — ${{ github.repository }}" \
              --arg url "$RUN_URL" \
              --argjson color $COLOR \
              --arg rama "${{ github.ref_name }}" \
              --arg commit "$COMMIT_CORTO" \
              --arg commiturl "$COMMIT_URL" \
              --arg autor "${{ github.actor }}" \
              --arg paso "$PASO_FALLIDO" \
              --arg err "$ERR_LOG" \
              --arg install "$INSTALL_OUT" \
              --arg build "$BUILD_OUT" \
              --arg ssh "$SSH_OUT" \
              --arg transfer "$TRANSFER_OUT" \
              --arg reload "$RELOAD_OUT" \
              '{embeds: [{
                title: $titulo, url: $url, color: $color,
                fields: [
                  {name: "Rama", value: $rama, inline: true},
                  {name: "Paso que falló", value: $paso, inline: true},
                  {name: "Autor", value: $autor, inline: true},
                  {name: "Commit", value: ("[`" + $commit + "`](" + $commiturl + ")"), inline: false},
                  {name: "Outcomes", value: ("install=" + $install + " · build=" + $build + " · ssh=" + $ssh + " · transfer=" + $transfer + " · reload=" + $reload), inline: false},
                  {name: "Error", value: ("```\n" + ($err | .[0:900]) + "\n```"), inline: false}
                ],
                timestamp: (now | todate)
              }]}')
          fi

          curl -s -H "Content-Type: application/json" -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" -d "$PAYLOAD"
