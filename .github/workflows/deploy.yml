name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Marcar inicio
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        id: install
        run: |
          { npm ci
          } 2>&1 | tee -a /tmp/deploy.log

      - name: Build
        id: build
        run: |
          { npm run build
          } 2>&1 | tee -a /tmp/deploy.log

      - name: Setup SSH key
        id: ssh_setup
        run: |
          { mkdir -p ~/.ssh
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh-keyscan -H ${{ secrets.FRONT_HOST }} >> ~/.ssh/known_hosts
          } 2>&1 | tee -a /tmp/deploy.log

      - name: Sincronizar build al servidor (rsync, solo deltas)
        id: transfer
        run: |
          { rsync -avz --delete \
              --rsync-path="sudo rsync" \
              -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
              build/ \
              ${{ secrets.SSH_USER }}@${{ secrets.FRONT_HOST }}:/var/www/front/build/
          } 2>&1 | tee -a /tmp/deploy.log

      - name: Recargar Nginx
        id: reload
        run: |
          { ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.FRONT_HOST }} \
              "sudo systemctl reload nginx && systemctl is-active nginx"
          } 2>&1 | tee -a /tmp/deploy.log

      - name: Notificar en Discord
        if: always()
        continue-on-error: true
        run: |
          DURATION=$(( $(date +%s) - ${DEPLOY_START:-$(date +%s)} ))
          MIN=$(( DURATION / 60 )); SEC=$(( DURATION % 60 ))

          if [ "${{ job.status }}" = "success" ]; then
            EMOJI="✅"; COLOR=3066993; TITULO="Deploy exitoso"
          else
            EMOJI="❌"; COLOR=15158332; TITULO="Deploy fallido"
          fi

          PASO_FALLIDO="-"
          for par in \
            "Instalar dependencias:${{ steps.install.outcome }}" \
            "Build:${{ steps.build.outcome }}" \
            "Setup SSH:${{ steps.ssh_setup.outcome }}" \
            "Sincronizar build:${{ steps.transfer.outcome }}" \
            "Recargar Nginx:${{ steps.reload.outcome }}"
          do
            nombre="${par%%:*}"; estado="${par##*:}"
            [ "$estado" = "failure" ] && PASO_FALLIDO="$nombre"
          done

          ERR_LOG=$(tail -c 3000 /tmp/deploy.log 2>/dev/null | sed 's/\x1b\[[0-9;]*m//g')
          [ -z "$ERR_LOG" ] && ERR_LOG="(sin logs capturados)"

          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_CORTO="${{ github.sha }}"
          COMMIT_CORTO="${COMMIT_CORTO:0:7}"

          if [ "${{ job.status }}" = "success" ]; then
            PAYLOAD=$(jq -n \
              --arg titulo "$EMOJI $TITULO — ${{ github.repository }}" \
              --arg url "$RUN_URL" \
              --argjson color $COLOR \
              --arg rama "${{ github.ref_name }}" \
              --arg commit "$COMMIT_CORTO" \
              --arg commiturl "$COMMIT_URL" \
              --arg autor "${{ github.actor }}" \
              --arg duracion "${MIN}m ${SEC}s" \
              --arg sitio "http://${{ secrets.FRONT_HOST }}" \
              '{embeds: [{
                title: $titulo, url: $url, color: $color,
                fields: [
                  {name: "Rama", value: $rama, inline: true},
                  {name: "Duración", value: $duracion, inline: true},
                  {name: "Sitio", value: $sitio, inline: true},
                  {name: "Autor", value: $autor, inline: true},
                  {name: "Commit", value: ("[`" + $commit + "`](" + $commiturl + ")"), inline: true}
                ],
                timestamp: (now | todate)
              }]}')
          else
            PAYLOAD=$(jq -n \
              --arg titulo "$EMOJI $TITULO — ${{ github.repository }}" \
              --arg url "$RUN_URL" \
              --argjson color $COLOR \
              --arg rama "${{ github.ref_name }}" \
              --arg commit "$COMMIT_CORTO" \
              --arg commiturl "$COMMIT_URL" \
              --arg autor "${{ github.actor }}" \
              --arg paso "$PASO_FALLIDO" \
              --arg err "$ERR_LOG" \
              '{embeds: [{
                title: $titulo, url: $url, color: $color,
                fields: [
                  {name: "Rama", value: $rama, inline: true},
                  {name: "Paso que falló", value: $paso, inline: true},
                  {name: "Autor", value: $autor, inline: true},
                  {name: "Commit", value: ("[`" + $commit + "`](" + $commiturl + ")"), inline: false},
                  {name: "Error", value: ("```\n" + ($err | .[0:950]) + "\n```"), inline: false}
                ],
                timestamp: (now | todate)
              }]}')
          fi

          curl -s -H "Content-Type: application/json" -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" -d "$PAYLOAD"
