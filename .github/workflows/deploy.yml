name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.FRONT_HOST }} >> ~/.ssh/known_hosts

      - name: Sincronizar build al servidor (rsync, solo deltas)
        run: |
          rsync -avz --delete \
            --rsync-path="sudo rsync" \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            build/ \
            ${{ secrets.SSH_USER }}@${{ secrets.FRONT_HOST }}:/var/www/front/build/

      - name: Recargar Nginx
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.FRONT_HOST }} \
            "sudo systemctl reload nginx && systemctl is-active nginx"

      - name: Notificar en Discord
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            EMOJI="✅"; COLOR=3066993; TITULO="Deploy exitoso"
          else
            EMOJI="❌"; COLOR=15158332; TITULO="Deploy fallido"
          fi
          curl -s -H "Content-Type: application/json" -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" -d "{
            \"embeds\": [{
              \"title\": \"$EMOJI $TITULO — ${{ github.repository }}\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"color\": $COLOR,
              \"fields\": [
                {\"name\": \"Rama\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                {\"name\": \"Commit\", \"value\": \"[\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true},
                {\"name\": \"Autor\", \"value\": \"${{ github.actor }}\", \"inline\": true}
              ]
            }]
          }"
